name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

jobs:
  # Verify the tag version matches the code
  verify:
    name: Verify version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version matches tag
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          echo "Tag: $TAG_VER, package.json: $PKG_VER"
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Tag version ($TAG_VER) does not match package.json ($PKG_VER)"
            exit 1
          fi

  # Try to download artifacts from latest main build
  release:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-ARM
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-Intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

    name: Release (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Try downloading pre-built artifacts from the latest main build
      - name: Check for pre-built artifacts
        id: cached
        uses: actions/download-artifact@v4
        with:
          name: assetbox-${{ matrix.target }}
          path: pre-built
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.repository.default_branch }}
        continue-on-error: true

      # If no cached artifacts, build from scratch
      - name: Setup Node.js
        if: steps.cached.outcome == 'failure'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        if: steps.cached.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        if: steps.cached.outcome == 'failure'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        if: steps.cached.outcome == 'failure'
        run: npm ci

      - name: Build and release
        if: steps.cached.outcome == 'failure'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AssetBox ${{ github.ref_name }}"
          releaseBody: "See the changelog for details."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Create release from cached artifacts
        if: steps.cached.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "AssetBox ${{ github.ref_name }}"
          body: "See the changelog for details."
          draft: true
          files: pre-built/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
